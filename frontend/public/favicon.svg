  <rect width="32" height="32" rx="8" fill="#1e1b18"/>
  <!-- shopping bag body -->
  <path
    d="M9 13h14l-1.5 11H10.5L9 13Z"
    fill="#f97316"
    opacity="0.95"
  />
  <!-- bag handle -->
